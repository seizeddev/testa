name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Versions
        run: swift --version && xcodebuild -version

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

      - name: Smoke — help + layout
        run: |
          ./.build/release/testa help
          ./.build/release/testa layout

      # Best-effort live smoke: boot a simulator and connect. Non-fatal because
      # CI simulators occasionally fail to expose the accessibility bridge.
      - name: Live smoke (boot + info)
        continue-on-error: true
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "import json,sys;d=json.load(sys.stdin);print([v['udid'] for k,vs in d['devices'].items() for v in vs if 'iPhone' in v['name']][0])")
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          ./.build/release/testa --udid "$UDID" info
          ./.build/release/testa --udid "$UDID" ui | head -5
